<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ドローン大冒険 - ランキング版</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #87CEEB, #98FB98);
            overflow: hidden;
            user-select: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        #gameCanvas {
            display: block;
            border: 3px solid #FF69B4;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            background: white;
            max-width: 95vw;
            max-height: 80vh;
            object-fit: contain;
            touch-action: none;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        #controls {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
            padding: 0 10px;
            box-sizing: border-box;
            display: none;
        }

        .joystick-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            touch-action: none;
        }

        .joystick {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            position: absolute;
            transform: translate(-50%, -50%);
        }

        #attackButton {
            background: linear-gradient(45deg, #FF1493, #FF69B4);
            color: white;
            border: none;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FF69B4, #87CEEB);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 20;
        }

        #rankingScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #4B0082, #FF69B4);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 25;
            overflow-y: auto;
            padding: 20px;
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 30;
        }

        .screen-button {
            padding: 15px 30px;
            font-size: 20px;
            background: linear-gradient(45deg, #FF1493, #FF69B4);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
            margin: 10px;
            touch-action: manipulation;
        }

        .screen-button:hover,
        .screen-button:active {
            transform: scale(1.1);
        }

        .ranking-table {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            width: 90%;
            max-width: 500px;
        }

        .ranking-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 5px;
        }

        .ranking-row.top3 {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #000;
            border-radius: 10px;
            font-weight: bold;
        }

        .wallet-input {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 10px;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            width: 90%;
            max-width: 400px;
        }

        .qr-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 40;
        }

        .qr-content {
            background: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            color: #000;
        }

        .boss-health-bar {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 20px;
            background: rgba(255, 0, 0, 0.3);
            border: 2px solid #fff;
            border-radius: 10px;
            display: none;
            z-index: 15;
        }

        .boss-health-fill {
            height: 100%;
            background: linear-gradient(45deg, #FF0000, #FF6666);
            border-radius: 8px;
            transition: width 0.3s ease;
        }

        .emoji {
            font-size: 32px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-10px);
            }

            60% {
                transform: translateY(-5px);
            }
        }

        .success-message {
            background: #4CAF50;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            display: none;
        }

        .error-message {
            background: #f44336;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            display: none;
        }

        /* Android向け最適化 */
        @media (max-width: 600px) {
            #ui {
                font-size: 12px;
                top: 5px;
                left: 5px;
                gap: 5px;
            }

            #controls {
                bottom: 5px;
            }

            .joystick-area {
                width: 100px;
                height: 100px;
            }

            .joystick {
                width: 40px;
                height: 40px;
            }

            #attackButton {
                width: 70px;
                height: 70px;
                font-size: 18px;
            }

            .screen-button {
                font-size: 18px;
                padding: 12px 24px;
            }
        }

        /* 小型スマートフォン向け追加最適化 */
        @media (max-width: 360px) {
            .joystick-area {
                width: 80px;
                height: 80px;
            }

            .joystick {
                width: 30px;
                height: 30px;
            }

            #attackButton {
                width: 60px;
                height: 60px;
                font-size: 16px;
            }
        }

        /* 横向き最適化 */
        @media (orientation: landscape) and (max-height: 500px) {
            #controls {
                bottom: 0;
            }

            .joystick-area {
                width: 80px;
                height: 80px;
            }

            #attackButton {
                width: 60px;
                height: 60px;
            }

            #gameCanvas {
                max-height: 70vh;
            }
        }

        /* QRコード表示の最適化 */
        .qr-content {
            max-width: 90%;
            padding: 15px;
        }

        #qrCode img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>

<body>
    <div id="startScreen">
        <h1 style="font-size: 48px; margin-bottom: 20px;">🚁 ドローン大冒険 🚁</h1>
        <p style="font-size: 24px; margin-bottom: 30px;">仲間と一緒に空の旅に出よう！</p>
        <div class="emoji">✨🌟💫⭐</div>
        <button id="startButton" class="screen-button" style="margin-top: 30px;">ゲームスタート！</button>
        <button id="showRankingButton" class="screen-button">ランキング表示</button>
    </div>

    <div id="rankingScreen">
        <h2 style="font-size: 36px; margin-bottom: 20px;">🏆 ランキング 🏆</h2>
        <div class="ranking-table" id="rankingTable">
            <div style="text-align: center; padding: 20px;">ランキングを読み込み中...</div>
        </div>
        <button id="backToMenuButton" class="screen-button">メニューに戻る</button>
    </div>

    <div id="gameOverScreen">
        <h2 style="font-size: 36px; margin-bottom: 20px;">ゲームオーバー</h2>
        <div id="finalScore" style="font-size: 24px; margin-bottom: 20px;"></div>
        <div id="finalLevel" style="font-size: 20px; margin-bottom: 30px;"></div>
        <input type="text" id="playerNameInput" class="wallet-input" placeholder="プレイヤー名を入力" maxlength="20">
        <input type="text" id="walletInput" class="wallet-input" placeholder="XAMAN Wallet アドレス (上位3位のみ)"
            style="display: none;">
        <div id="walletError" class="error-message">無効なウォレットアドレスです</div>
        <div id="scoreSuccess" class="success-message">スコアが正常に登録されました！</div>
        <button id="submitScoreButton" class="screen-button">スコアを登録</button>
        <button id="restartButton" class="screen-button">もう一度プレイ</button>
        <button id="backToMenuFromGameOver" class="screen-button">メニューに戻る</button>
    </div>

    <div class="qr-modal" id="qrModal">
        <div class="qr-content">
            <h3>XRP受取用QRコード</h3>
            <div id="qrCode"></div>
            <p id="walletAddress"></p>
            <p id="qrInstructions">XAMANウォレットでスキャンしてXRPを送信できます</p>
            <button class="screen-button" onclick="closeQRModal()">閉じる</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div>❤️ HP: <span id="hp">100</span></div>
        <div>⭐ スコア: <span id="score">0</span></div>
        <div>👥 仲間: <span id="allies">0</span></div>
        <div>🏆 レベル: <span id="level">1</span></div>
        <div id="stageDisplay">🌅 ステージ: <span id="stage">1</span></div>
    </div>

    <div class="boss-health-bar" id="bossHealthBar">
        <div class="boss-health-fill" id="bossHealthFill"></div>
    </div>

    <div id="controls">
        <div id="leftJoystickArea" class="joystick-area">
            <div id="leftJoystick" class="joystick"></div>
        </div>
        <button id="attackButton">攻撃</button>
        <div id="rightJoystickArea" class="joystick-area">
            <div id="rightJoystick" class="joystick"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>
    <script>
        // ゲーム変数
        let gameState = 'start';
        let canvas, ctx;
        let player = { x: 400, y: 300, width: 40, height: 40, hp: 100, maxHp: 100 };
        let score = 0;
        let level = 1;
        let stage = 1;
        let allies = [];
        let enemies = [];
        let bullets = [];
        let enemyBullets = [];
        let particles = [];
        let gameRunning = false;
        let keys = {};
        let boss = null;
        let bossSpawned = false;

        // ランキングデータ（実際の実装では外部APIを使用）
        let rankings = [];

        // ウォレットアドレス検証関数
        function isValidXRPAddress(address) {
            // XRPアドレスの基本的な検証パターン
            const xrpPattern = /^r[1-9A-HJ-NP-Za-km-z]{25,34}$/;
            const classicPattern = /^[1-9A-HJ-NP-Za-km-z]{25,34}$/;
            return xrpPattern.test(address) || classicPattern.test(address);
        }

        // ランキング管理
        class RankingManager {
            constructor() {
                this.loadRankings();
            }

            loadRankings() {
                const saved = localStorage.getItem('droneGameRankings');
                if (saved) {
                    try {
                        rankings = JSON.parse(saved);
                    } catch (e) {
                        rankings = [];
                    }
                } else {
                    // デモデータ
                    rankings = [
                        { name: "ドローンマスター", score: 15000, level: 8, wallet: "rN7n7otQDd6FczFgLdSqtcsAUxDkw6fzRH" },
                        { name: "スカイハンター", score: 12500, level: 7, wallet: "rLNaPoKeeBjZe2sDQVDPyOMpLS64Hhh7x" },
                        { name: "エースパイロット", score: 10000, level: 6, wallet: "rHb9CJAWyB4rj91VRWn96DkukG4bwdtyTh" }
                    ];
                }
                this.sortRankings();
            }

            saveRankings() {
                try {
                    localStorage.setItem('droneGameRankings', JSON.stringify(rankings));
                } catch (e) {
                    console.error('Failed to save rankings:', e);
                }
            }

            addScore(name, score, level, wallet = '') {
                if (!name || name.trim() === '') {
                    throw new Error('プレイヤー名を入力してください');
                }

                const newEntry = {
                    name: name.trim(),
                    score: score,
                    level: level,
                    wallet: wallet.trim(),
                    timestamp: Date.now()
                };

                // 上位3位に入る場合のウォレット検証
                const tempRankings = [...rankings, newEntry].sort((a, b) => b.score - a.score);
                const rank = tempRankings.findIndex(entry => entry === newEntry) + 1;

                if (rank <= 3 && wallet && !isValidXRPAddress(wallet)) {
                    throw new Error('無効なXRPウォレットアドレスです');
                }

                rankings.push(newEntry);
                this.sortRankings();
                this.saveRankings();

                return rank;
            }

            sortRankings() {
                rankings.sort((a, b) => b.score - a.score);
                rankings = rankings.slice(0, 20); // 上位20位まで保持
            }

            getRankings() {
                return rankings;
            }
        }

        const rankingManager = new RankingManager();

        // 初期化
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');

            // キャンバスサイズ設定
            canvas.width = 800;
            canvas.height = 600;

            // イベントリスナー設定
            setupEventListeners();

            // ゲームループ開始
            gameLoop();

            // ランキング表示
            displayRankings();
        }

        function setupEventListeners() {
            // スタートボタン
            document.getElementById('startButton').addEventListener('click', startGame);

            // ランキング表示ボタン
            document.getElementById('showRankingButton').addEventListener('click', showRankingScreen);

            // メニュー戻るボタン
            document.getElementById('backToMenuButton').addEventListener('click', showStartScreen);
            document.getElementById('backToMenuFromGameOver').addEventListener('click', showStartScreen);

            // リスタートボタン
            document.getElementById('restartButton').addEventListener('click', restartGame);

            // スコア登録ボタン
            document.getElementById('submitScoreButton').addEventListener('click', submitScore);

            // キーボードイベント
            document.addEventListener('keydown', (e) => {
                keys[e.key] = true;
                if (e.key === ' ') {
                    e.preventDefault();
                    if (gameRunning) shoot();
                }
            });

            document.addEventListener('keyup', (e) => {
                keys[e.key] = false;
            });

            // プレイヤー名入力でウォレット入力表示切り替え
            document.getElementById('playerNameInput').addEventListener('input', function () {
                const walletInput = document.getElementById('walletInput');
                if (this.value.trim()) {
                    // 現在のスコアが上位3位に入るかチェック
                    const tempRankings = [...rankings, { score: score }].sort((a, b) => b.score - a.score);
                    const potentialRank = tempRankings.findIndex(entry => entry.score === score) + 1;

                    if (potentialRank <= 3) {
                        walletInput.style.display = 'block';
                    } else {
                        walletInput.style.display = 'none';
                    }
                } else {
                    walletInput.style.display = 'none';
                }
            });
        }

        function startGame() {
            gameState = 'playing';
            gameRunning = true;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';

            // ゲーム初期化
            resetGame();
        }

        function resetGame() {
            player = { x: 400, y: 300, width: 40, height: 40, hp: 100, maxHp: 100 };
            score = 0;
            level = 1;
            stage = 1;
            allies = [];
            enemies = [];
            bullets = [];
            enemyBullets = [];
            particles = [];
            boss = null;
            bossSpawned = false;

            updateUI();
            spawnInitialEnemies();
        }

        function spawnInitialEnemies() {
            for (let i = 0; i < 3; i++) {
                spawnEnemy();
            }
        }

        function spawnEnemy() {
            enemies.push({
                x: Math.random() * canvas.width,
                y: Math.random() * 100,
                width: 30,
                height: 30,
                hp: 50,
                maxHp: 50,
                speed: 1 + Math.random() * 2,
                shootTimer: 0
            });
        }

        function spawnAlly() {
            allies.push({
                x: player.x + (Math.random() - 0.5) * 100,
                y: player.y + (Math.random() - 0.5) * 100,
                width: 25,
                height: 25,
                speed: 2,
                shootTimer: 0
            });
        }

        function shoot() {
            bullets.push({
                x: player.x + player.width / 2,
                y: player.y,
                width: 4,
                height: 10,
                speed: 8,
                damage: 25
            });
        }

        function gameLoop() {
            if (gameRunning) {
                update();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }

        function update() {
            if (!gameRunning) return;

            // プレイヤー移動
            if (keys['ArrowLeft'] || keys['a']) player.x = Math.max(0, player.x - 5);
            if (keys['ArrowRight'] || keys['d']) player.x = Math.min(canvas.width - player.width, player.x + 5);
            if (keys['ArrowUp'] || keys['w']) player.y = Math.max(0, player.y - 5);
            if (keys['ArrowDown'] || keys['s']) player.y = Math.min(canvas.height - player.height, player.y + 5);

            // 弾丸更新
            bullets = bullets.filter(bullet => {
                bullet.y -= bullet.speed;
                return bullet.y > -bullet.height;
            });

            enemyBullets = enemyBullets.filter(bullet => {
                bullet.y += bullet.speed;
                return bullet.y < canvas.height + bullet.height;
            });

            // 敵更新
            enemies.forEach(enemy => {
                enemy.y += enemy.speed;
                enemy.shootTimer++;

                if (enemy.shootTimer > 60) {
                    enemyBullets.push({
                        x: enemy.x + enemy.width / 2,
                        y: enemy.y + enemy.height,
                        width: 4,
                        height: 8,
                        speed: 4,
                        damage: 10
                    });
                    enemy.shootTimer = 0;
                }
            });

            // 画面外に出た敵を削除し、新しい敵をスポーン
            enemies = enemies.filter(enemy => {
                if (enemy.y > canvas.height) {
                    spawnEnemy();
                    return false;
                }
                return true;
            });

            // 当たり判定
            checkCollisions();

            // スコアに応じたレベルアップ
            if (score > level * 1000) {
                level++;
                updateUI();

                // レベルアップ時に仲間追加
                if (Math.random() < 0.3) {
                    spawnAlly();
                }
            }

            // ステージ進行
            if (score > stage * 2000 && !bossSpawned) {
                stage++;
                spawnBoss();
            }
        }

        function spawnBoss() {
            boss = {
                x: canvas.width / 2 - 50,
                y: 50,
                width: 100,
                height: 80,
                hp: 200,
                maxHp: 200,
                speed: 2,
                shootTimer: 0
            };
            bossSpawned = true;
            document.getElementById('bossHealthBar').style.display = 'block';
            updateBossHealthBar();
        }

        function updateBossHealthBar() {
            if (boss) {
                const healthPercent = (boss.hp / boss.maxHp) * 100;
                document.getElementById('bossHealthFill').style.width = healthPercent + '%';
            }
        }

        function checkCollisions() {
            // プレイヤーの弾と敵の当たり判定
            bullets.forEach((bullet, bulletIndex) => {
                enemies.forEach((enemy, enemyIndex) => {
                    if (isColliding(bullet, enemy)) {
                        enemy.hp -= bullet.damage;
                        bullets.splice(bulletIndex, 1);

                        if (enemy.hp <= 0) {
                            score += 100;
                            enemies.splice(enemyIndex, 1);
                            spawnEnemy();
                            updateUI();
                        }
                    }
                });

                // ボスとの当たり判定
                if (boss && isColliding(bullet, boss)) {
                    boss.hp -= bullet.damage;
                    bullets.splice(bulletIndex, 1);
                    updateBossHealthBar();

                    if (boss.hp <= 0) {
                        score += 1000;
                        boss = null;
                        bossSpawned = false;
                        document.getElementById('bossHealthBar').style.display = 'none';
                        updateUI();
                    }
                }
            });

            // 敵の弾とプレイヤーの当たり判定
            enemyBullets.forEach((bullet, bulletIndex) => {
                if (isColliding(bullet, player)) {
                    player.hp -= bullet.damage;
                    enemyBullets.splice(bulletIndex, 1);
                    updateUI();

                    if (player.hp <= 0) {
                        gameOver();
                    }
                }
            });
        }

        function isColliding(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y;
        }

        function draw() {
            if (!gameRunning) return;

            // 背景をクリア
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // プレイヤー描画
