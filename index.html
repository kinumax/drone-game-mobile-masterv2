<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ドローン操縦ゲーム（モバイル対応版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #87CEEB, #98FB98);
            overflow: hidden;
            user-select: none;
            display: flex;
            flex-direction: column; /* 垂直方向に並べる */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative; /* UI要素を絶対配置するための基準 */
        }

        #gameCanvas {
            display: block;
            border: 3px solid #FF69B4;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            background: white; /* Fallback, drawBackground will cover this */
            max-width: 95vw; /* 画面幅の95%に制限 */
            max-height: 80vh; /* 画面高さの80%に制限 (操作ボタン用スペースを確保) */
            object-fit: contain; /* アスペクト比を維持して表示 */
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 14px; /* フォントサイズを小さく */
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
            display: flex; /* 横並びにする */
            flex-wrap: wrap; /* 折り返しを許可 */
            gap: 8px; /* 要素間の隙間 */
        }

        #controls {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: flex;
            justify-content: space-around; /* 左右のジョイスティックを均等に配置 */
            align-items: center;
            z-index: 10;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .joystick-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            width: 120px; /* ジョイスティックの領域サイズ */
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            touch-action: none; /* タッチスクロールを無効にする */
        }

        .joystick {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            width: 50px; /* ジョイスティックのつまみサイズ */
            height: 50px;
            position: absolute;
            transform: translate(-50%, -50%); /* 中央に配置 */
        }

        #attackButton {
            background: linear-gradient(45deg, #FF1493, #FF69B4);
            color: white;
            border: none;
            border-radius: 50%;
            width: 80px; /* 攻撃ボタンのサイズ */
            height: 80px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            user-select: none;
            -webkit-tap-highlight-color: transparent; /* タップ時のハイライトを無効にする */
        }


        .heart {
            color: #FF69B4;
            font-size: 20px;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FF69B4, #87CEEB);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 20; /* Ensure start screen is on top */
        }

        #startButton {
            padding: 15px 30px;
            font-size: 24px;
            background: linear-gradient(45deg, #FF1493, #FF69B4);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        #startButton:hover {
            transform: scale(1.1);
        }

        .emoji {
            font-size: 32px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* Small screen adjustments */
        @media (max-width: 600px) {
            #ui {
                font-size: 12px;
                top: 5px;
                left: 5px;
                gap: 5px;
            }
            #controls {
                bottom: 5px;
            }
            .joystick-area {
                width: 100px;
                height: 100px;
            }
            .joystick {
                width: 40px;
                height: 40px;
            }
            #attackButton {
                width: 70px;
                height: 70px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1 style="font-size: 48px; margin-bottom: 20px;">🚁 ドローン大冒険 🚁</h1>
        <p style="font-size: 24px; margin-bottom: 30px;">仲間と一緒に空の旅に出よう！</p>
        <div class="emoji">✨🌟💫⭐</div>
        <button id="startButton" style="margin-top: 30px;">ゲームスタート！</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div>❤️ HP: <span id="hp">100</span></div>
        <div>⭐ スコア: <span id="score">0</span></div>
        <div>👥 仲間: <span id="allies">0</span></div>
        <div>🏆 レベル: <span id="level">1</span></div>
    </div>

    <div id="controls">
        <div id="leftJoystickArea" class="joystick-area">
            <div id="leftJoystick" class="joystick"></div>
        </div>
        <button id="attackButton">攻撃</button>
        <div id="rightJoystickArea" class="joystick-area">
            <div id="rightJoystick" class="joystick"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const startButton = document.getElementById('startButton');
        const leftJoystickArea = document.getElementById('leftJoystickArea');
        const leftJoystick = document.getElementById('leftJoystick');
        const rightJoystickArea = document.getElementById('rightJoystickArea');
        const rightJoystick = document.getElementById('rightJoystick');
        const attackButton = document.getElementById('attackButton');

        // キャンバスサイズをレスポンシブに調整
        function resizeCanvas() {
            canvas.width = window.innerWidth * 0.95; // 画面幅の95%
            canvas.height = window.innerHeight * 0.7; // 画面高さの70% (操作ボタンに20-30%確保)
            // 最小サイズを設定して、極端に小さくならないようにする
            canvas.width = Math.max(canvas.width, 320);
            canvas.height = Math.max(canvas.height, 240);
            
            // プレイヤー位置を再調整（キャンバスサイズ変更後に必要）
            if (gameState.running) {
                 player.x = Math.min(player.x, canvas.width - player.size / 2);
                 player.y = Math.min(player.y, canvas.height - player.size / 2);
                 player.x = Math.max(player.x, player.size / 2);
                 player.y = Math.max(player.y, player.size / 2);
            } else {
                player.x = canvas.width / 2;
                player.y = canvas.height / 2;
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); // 初期ロード時にもサイズ調整

        // ゲーム状態
        let gameState = {
            running: false,
            score: 0,
            hp: 100,
            allies: 0,
            level: 1,
            backgroundOffset: 0
        };

        // プレイヤー
        let player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 25,
            speed: 5,
            color: '#FF69B4'
        };

        // ゲームオブジェクト配列
        let enemies = [];
        let bullets = [];
        let collectibles = [];
        let allyDrones = [];
        let particles = [];

        // 背景要素
        let clouds = [];
        let mountains = [];
        let buildings = [];

        // 入力管理（キーボードとタッチの両方に対応）
        let keys = {};
        let touchInput = {
            left: { active: false, startX: 0, startY: 0, currentX: 0, currentY: 0, dx: 0, dy: 0 },
            right: { active: false, startX: 0, startY: 0, currentX: 0, currentY: 0, dx: 0, dy: 0 }
        };

        // イベントリスナー
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
                if (gameState.running) shootBullet();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        startButton.addEventListener('click', startGame);

        // タッチ操作イベントリスナー
        leftJoystickArea.addEventListener('touchstart', handleJoystickStart);
        leftJoystickArea.addEventListener('touchmove', handleJoystickMove);
        leftJoystickArea.addEventListener('touchend', handleJoystickEnd);
        leftJoystickArea.addEventListener('touchcancel', handleJoystickEnd);

        rightJoystickArea.addEventListener('touchstart', handleJoystickStart);
        rightJoystickArea.addEventListener('touchmove', handleJoystickMove);
        rightJoystickArea.addEventListener('touchend', handleJoystickEnd);
        rightJoystickArea.addEventListener('touchcancel', handleJoystickEnd);

        attackButton.addEventListener('touchstart', (e) => {
            e.preventDefault(); // デフォルトの動作（スクロールなど）を防止
            if (gameState.running) shootBullet();
            attackButton.style.transform = 'scale(0.9)'; // 押下時のフィードバック
        });
        attackButton.addEventListener('touchend', (e) => {
            e.preventDefault();
            attackButton.style.transform = 'scale(1)';
        });


        function handleJoystickStart(e) {
            e.preventDefault(); // スクロールなどを防止
            const touch = e.changedTouches[0];
            const targetArea = e.currentTarget;
            const rect = targetArea.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            if (targetArea.id === 'leftJoystickArea') {
                touchInput.left.active = true;
                touchInput.left.startX = touch.clientX;
                touchInput.left.startY = touch.clientY;
                touchInput.left.currentX = touch.clientX;
                touchInput.left.currentY = touch.clientY;
                leftJoystick.style.left = (touch.clientX - rect.left) + 'px';
                leftJoystick.style.top = (touch.clientY - rect.top) + 'px';
            } else if (targetArea.id === 'rightJoystickArea') {
                touchInput.right.active = true;
                touchInput.right.startX = touch.clientX;
                touchInput.right.startY = touch.clientY;
                touchInput.right.currentX = touch.clientX;
                touchInput.right.currentY = touch.clientY;
                rightJoystick.style.left = (touch.clientX - rect.left) + 'px';
                rightJoystick.style.top = (touch.clientY - rect.top) + 'px';
            }
        }

        function handleJoystickMove(e) {
            e.preventDefault(); // スクロールなどを防止
            const touch = e.changedTouches[0];
            const targetArea = e.currentTarget;
            const rect = targetArea.getBoundingClientRect();
            const radius = rect.width / 2;

            let inputObj = (targetArea.id === 'leftJoystickArea') ? touchInput.left : touchInput.right;
            let joystickElement = (targetArea.id === 'leftJoystickArea') ? leftJoystick : rightJoystick;

            if (inputObj.active) {
                let dx = touch.clientX - inputObj.startX;
                let dy = touch.clientY - inputObj.startY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > radius) {
                    dx = (dx / dist) * radius;
                    dy = (dy / dist) * radius;
                }

                inputObj.dx = dx;
                inputObj.dy = dy;

                joystickElement.style.left = (radius + dx) + 'px';
                joystickElement.style.top = (radius + dy) + 'px';
            }
        }

        function handleJoystickEnd(e) {
            e.preventDefault();
            const targetArea = e.currentTarget;

            let inputObj = (targetArea.id === 'leftJoystickArea') ? touchInput.left : touchInput.right;
            let joystickElement = (targetArea.id === 'leftJoystickArea') ? leftJoystick : rightJoystick;

            inputObj.active = false;
            inputObj.dx = 0;
            inputObj.dy = 0;
            joystickElement.style.left = '50%';
            joystickElement.style.top = '50%';
        }


        function startGame() {
            startScreen.style.display = 'none';
            gameState.running = true;
            gameState.hp = 100;
            gameState.score = 0;
            gameState.allies = 0;
            gameState.level = 1;
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            initializeGame();
            if (!gameLoopRequestId) {
                gameLoop();
            }
            // モバイル操作UIを表示
            document.getElementById('controls').style.display = 'flex';
        }
        
        let gameLoopRequestId;

        function initializeGame() {
            initializeClouds();
            initializeMountains();
            initializeBuildings();
            
            enemies = [];
            bullets = [];
            collectibles = [];
            allyDrones = [];
            particles = [];
            
            spawnInitialObjects();
        }

        function initializeClouds() {
            clouds = [];
            for (let i = 0; i < 8; i++) {
                clouds.push({
                    x: Math.random() * canvas.width * 1.5,
                    y: Math.random() * (canvas.height * 0.4) + 20,
                    size: Math.random() * 40 + 30,
                    speed: Math.random() * 0.5 + 0.2
                });
            }
        }

        function initializeMountains() {
            mountains = [];
            let currentX = -50;
            for (let i = 0; i < 6; i++) {
                const width = Math.random() * 150 + 100;
                mountains.push({
                    x: currentX,
                    y: canvas.height - (Math.random() * 150 + 120),
                    width: width,
                    height: Math.random() * 150 + 120
                });
                currentX += width * (Math.random() * 0.5 + 0.5);
            }
        }
        
        function initializeBuildings() {
            buildings = [];
            let currentX = 0;
            for (let i = 0; i < 10; i++) {
                const width = Math.random() * 40 + 30;
                const height = Math.random() * 100 + 50;
                buildings.push({
                    x: currentX + Math.random() * 20,
                    y: canvas.height - height,
                    width: width,
                    height: height
                });
                currentX += width + 10;
                if (currentX > canvas.width) break;
            }
        }

        function spawnInitialObjects() {
            for (let i = 0; i < 3; i++) {
                spawnEnemy();
            }
            for (let i = 0; i < 5; i++) {
                spawnCollectible();
            }
            for (let i = 0; i < 2; i++) {
                spawnAllyCandidate();
            }
        }

        function spawnEnemy() {
            enemies.push({
                x: Math.random() * canvas.width,
                y: Math.random() * (canvas.height * 0.5),
                size: 20,
                speed: Math.random() * 1.5 + 1,
                hp: 2,
                color: '#FF4444',
                type: Math.random() > 0.5 ? 'chaser' : 'patrol',
                angle: Math.random() * Math.PI * 2,
                lastShot: Date.now() + Math.random() * 2000
            });
        }

        function spawnCollectible() {
            collectibles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * (canvas.height - 50) + 25,
                size: 15,
                type: Math.random() > 0.3 ? 'star' : 'heart',
                bounce: Math.random() * Math.PI * 2,
                collected: false
            });
        }

        function spawnAllyCandidate() {
            collectibles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * (canvas.height - 50) + 25,
                size: 20,
                type: 'ally',
                bounce: Math.random() * Math.PI * 2,
                collected: false
            });
        }
        
        function shootBullet() {
            bullets.push({
                x: player.x,
                y: player.y - player.size * 0.6,
                size: 6,
                speed: 8,
                color: '#FFD700',
                type: 'player'
            });
        }

        function updatePlayer() {
            // キーボード操作
            if (keys['w'] || keys['arrowup']) player.y = Math.max(player.size / 2, player.y - player.speed);
            if (keys['s'] || keys['arrowdown']) player.y = Math.min(canvas.height - player.size / 2, player.y + player.speed);
            if (keys['a'] || keys['arrowleft']) player.x = Math.max(player.size / 2, player.x - player.speed);
            if (keys['d'] || keys['arrowright']) player.x = Math.min(canvas.width - player.size / 2, player.x + player.speed);

            // ジョイスティック操作
            if (touchInput.left.active) {
                const moveSpeed = player.speed * 0.8; // タッチ操作の移動速度を調整
                player.x += (touchInput.left.dx / 60) * moveSpeed; // 60はジョイスティック領域の半径の目安
                player.y += (touchInput.left.dy / 60) * moveSpeed;
            }

            // 画面外に出ないように制限
            player.x = Math.max(player.size / 2, Math.min(canvas.width - player.size / 2, player.x));
            player.y = Math.max(player.size / 2, Math.min(canvas.height - player.size / 2, player.y));
        }

        function updateEnemies() {
            enemies.forEach((enemy, index) => {
                if (enemy.type === 'chaser') {
                    const dx = player.x - enemy.x;
                    const dy = player.y - enemy.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 0) {
                        enemy.x += (dx / dist) * enemy.speed * 0.7;
                        enemy.y += (dy / dist) * enemy.speed * 0.7;
                    }
                } else {
                    enemy.x += Math.cos(enemy.angle) * enemy.speed;
                    enemy.y += Math.sin(enemy.angle) * enemy.speed;
                    
                    if (enemy.x < enemy.size || enemy.x > canvas.width - enemy.size) enemy.angle = Math.PI - enemy.angle;
                    if (enemy.y < enemy.size || enemy.y > canvas.height - enemy.size - 100) enemy.angle = -enemy.angle;
                    enemy.x = Math.max(enemy.size, Math.min(canvas.width - enemy.size, enemy.x));
                    enemy.y = Math.max(enemy.size, Math.min(canvas.height - enemy.size, enemy.y));
                }

                if (Date.now() - enemy.lastShot > (2000 + (Math.random() * 1000))) {
                    const dx = player.x - enemy.x;
                    const dy = player.y - enemy.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 300 && dist > 0) {
                        bullets.push({
                            x: enemy.x,
                            y: enemy.y,
                            size: 5,
                            speed: 4,
                            vx: (dx / dist) * 4,
                            vy: (dy / dist) * 4,
                            color: '#FF6666',
                            type: 'enemy'
                        });
                        enemy.lastShot = Date.now();
                    }
                }

                const dxPlayer = player.x - enemy.x;
                const dyPlayer = player.y - enemy.y;
                const distPlayer = Math.sqrt(dxPlayer * dxPlayer + dyPlayer * dyPlayer);
                if (distPlayer < player.size / 2 + enemy.size / 2) {
                    gameState.hp -= 10;
                    createParticles(enemy.x, enemy.y, '#FF4444', 10);
                    enemies.splice(index, 1);
                    spawnEnemy();
                    if (gameState.hp <= 0) gameOver();
                }
            });
        }

        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                if (bullet.type === 'player' || bullet.type === 'ally') {
                    if (bullet.type === 'player'){
                        bullet.y -= bullet.speed;
                    } else {
                        bullet.x += bullet.vx;
                        bullet.y += bullet.vy;
                    }
                    
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const enemy = enemies[j];
                        const dx = bullet.x - enemy.x;
                        const dy = bullet.y - enemy.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < bullet.size / 2 + enemy.size / 2) {
                            enemy.hp--;
                            createParticles(bullet.x, bullet.y, '#FFD700', 5);
                            bullets.splice(i, 1);
                            
                            if (enemy.hp <= 0) {
                                gameState.score += 100;
                                createParticles(enemy.x, enemy.y, enemy.color, 15);
                                enemies.splice(j, 1);
                                spawnEnemy();
                                if (Math.random() < 0.2) spawnCollectible();
                            }
                            break;
                        }
                    }
                } else {
                    bullet.x += bullet.vx;
                    bullet.y += bullet.vy;
                    
                    const dx = bullet.x - player.x;
                    const dy = bullet.y - player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < bullet.size / 2 + player.size / 2) {
                        gameState.hp -= 5;
                        createParticles(bullet.x, bullet.y, '#FF69B4', 10);
                        bullets.splice(i, 1);
                        if (gameState.hp <= 0) gameOver();
                        break;
                    }
                }

                if (bullets[i] && (bullet.y < -bullet.size || bullet.y > canvas.height + bullet.size || bullet.x < -bullet.size || bullet.x > canvas.width + bullet.size)) {
                    bullets.splice(i, 1);
                }
            }
        }
        
        function updateCollectibles() {
            for (let i = collectibles.length - 1; i >= 0; i--) {
                const item = collectibles[i];
                item.bounce += 0.05;
                
                const dx = player.x - item.x;
                const dy = player.y - item.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < player.size / 2 + item.size / 2 && !item.collected) {
                    item.collected = true;
                    let particleColor = '#FFFFFF';
                    if (item.type === 'star') {
                        gameState.score += 50;
                        particleColor = '#FFD700';
                    } else if (item.type === 'heart') {
                        gameState.hp = Math.min(100, gameState.hp + 20);
                        particleColor = '#FF69B4';
                    } else if (item.type === 'ally') {
                        gameState.allies++;
                        spawnAllyDrone();
                        particleColor = '#98FB98';
                    }
                    createParticles(item.x, item.y, particleColor, 12);
                    collectibles.splice(i, 1);
                }
            }
        }

        function spawnAllyDrone() {
            allyDrones.push({
                x: player.x + (Math.random() * 60 - 30),
                y: player.y + (Math.random() * 60 - 30),
                size: 18,
                speed: 3,
                angle: Math.random() * Math.PI * 2,
                offsetAngle: Math.random() * Math.PI * 2,
                lastShot: Date.now() + Math.random() * 1500
            });
        }

        function updateAllyDrones() {
            allyDrones.forEach(ally => {
                ally.offsetAngle += 0.02;
                const targetX = player.x + Math.cos(ally.offsetAngle) * (60 + gameState.allies * 5);
                const targetY = player.y + Math.sin(ally.offsetAngle) * (40 + gameState.allies * 5);
                
                ally.x += (targetX - ally.x) * 0.08;
                ally.y += (targetY - ally.y) * 0.08;

                if (Date.now() - ally.lastShot > (1500 - gameState.allies * 100) && enemies.length > 0) {
                    let nearestEnemy = null;
                    let minDist = Infinity;

                    enemies.forEach(enemy => {
                        const dX = enemy.x - ally.x;
                        const dY = enemy.y - ally.y;
                        const d = Math.sqrt(dX * dX + dY * dY);
                        if (d < minDist && d < 250) {
                            minDist = d;
                            nearestEnemy = enemy;
                        }
                    });
                    
                    if (nearestEnemy) {
                        const dxBullet = nearestEnemy.x - ally.x;
                        const dyBullet = nearestEnemy.y - ally.y;
                        bullets.push({
                            x: ally.x,
                            y: ally.y,
                            size: 5,
                            vx: (dxBullet / minDist) * 6,
                            vy: (dyBullet / minDist) * 6,
                            color: '#98FB98',
                            type: 'ally'
                        });
                        ally.lastShot = Date.now();
                    }
                }
            });
        }

        function createParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * (Math.random() * 6 + 2),
                    vy: (Math.random() - 0.5) * (Math.random() * 6 + 2) - 1,
                    size: Math.random() * 3 + 1.5,
                    color: color,
                    life: Math.random() * 30 + 20
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.size *= 0.98;
                
                if (p.life <= 0 || p.size < 0.5) {
                    particles.splice(i, 1);
                }
            }
        }

        function spawnNewObjects() {
            const maxEnemies = 5 + Math.floor(gameState.score / 500);
            if (Math.random() < (0.01 + gameState.level * 0.002) && enemies.length < maxEnemies) {
                spawnEnemy();
            }
            
            if (Math.random() < 0.005 && collectibles.length < 10) {
                spawnCollectible();
            }
            
            if (Math.random() < (0.001 + gameState.level * 0.0005) && collectibles.filter(c => c.type === 'ally').length < (1 + Math.floor(gameState.allies / 2)) ) {
                if (collectibles.filter(c => c.type === 'ally').length < 3) {
                    spawnAllyCandidate();
                }
            }
        }
        
        function updateUI() {
            document.getElementById('hp').textContent = Math.max(0, gameState.hp);
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('allies').textContent = gameState.allies;
            document.getElementById('level').textContent = gameState.level;

            if (gameState.score >= gameState.level * 500) {
                gameState.level++;
                player.speed += 0.2;
                createParticles(canvas.width/2, canvas.height/2, '#FFFF00', 50);
            }
        }

        function gameOver() {
            gameState.running = false;
            cancelAnimationFrame(gameLoopRequestId);
            gameLoopRequestId = null;
            
            // モバイル操作UIを非表示
            document.getElementById('controls').style.display = 'none';

            setTimeout(() => {
                alert('ゲームオーバー！ スコア: ' + gameState.score + ' レベル: ' + gameState.level);
                startScreen.style.display = 'flex';
            }, 100);
        }


        // --- Draw Functions ---
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.6, '#B2FFFF');
            gradient.addColorStop(1, '#98FB98');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            mountains.forEach(mountain => {
                ctx.fillStyle = '#A9A9A9';
                ctx.beginPath();
                ctx.moveTo(mountain.x, canvas.height);
                ctx.lineTo(mountain.x + mountain.width / 2, mountain.y);
                ctx.lineTo(mountain.x + mountain.width, canvas.height);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                const snowHeight = mountain.height * 0.3;
                ctx.beginPath();
                ctx.moveTo(mountain.x + mountain.width / 2, mountain.y);
                ctx.lineTo(mountain.x + mountain.width / 2 - mountain.width * 0.15, mountain.y + snowHeight);
                ctx.lineTo(mountain.x + mountain.width / 2 + mountain.width * 0.15, mountain.y + snowHeight);
                ctx.closePath();
                ctx.fill();
            });

            buildings.forEach(building => {
                ctx.fillStyle = '#696969';
                ctx.fillRect(building.x, building.y, building.width, building.height);
                
                ctx.fillStyle = Math.random() > 0.3 ? '#FFFFE0' : '#333333';
                const windowWidth = building.width / 4;
                const windowHeight = building.height / 6;
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 2; c++) {
                        if (Math.random() > 0.2) {
                            ctx.fillRect(
                                building.x + windowWidth / 2 + c * (windowWidth * 1.5),
                                building.y + windowHeight / 2 + r * (windowHeight * 1.3),
                                windowWidth,
                                windowHeight
                            );
                        }
                    }
                }
            });


            clouds.forEach(cloud => {
                cloud.x -= cloud.speed;
                if (cloud.x < -cloud.size * 2) cloud.x = canvas.width + cloud.size;
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.size * 0.6, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size * 0.4, cloud.y + cloud.size * 0.1, cloud.size * 0.7, 0, Math.PI * 2);
                ctx.arc(cloud.x - cloud.size * 0.5, cloud.y + cloud.size * 0.2, cloud.size * 0.5, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size * 0.1, cloud.y - cloud.size * 0.3, cloud.size * 0.6, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            });
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            ctx.fillStyle = 'rgba(100, 100, 100, 0.3)';
            ctx.beginPath();
            ctx.ellipse(0, -player.size * 0.7, player.size * 1.2, player.size * 0.3, Date.now()*0.01, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, player.size * 0.8, player.size * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#FFC0CB';
            ctx.beginPath();
            ctx.ellipse(0, -player.size * 0.1, player.size * 0.5, player.size * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(-player.size * 0.25, -player.size * 0.05, player.size * 0.15, 0, Math.PI * 2);
            ctx.arc(player.size * 0.25, -player.size * 0.05, player.size * 0.15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(-player.size * 0.25, -player.size * 0.05, player.size * 0.07, 0, Math.PI * 2);
            ctx.arc(player.size * 0.25, -player.size * 0.05, player.size * 0.07, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.save();
                ctx.translate(enemy.x, enemy.y);
                
                ctx.fillStyle = enemy.color;
                ctx.beginPath();
                ctx.moveTo(0, -enemy.size * 0.8);
                ctx.lineTo(enemy.size * 0.7, 0);
                ctx.lineTo(0, enemy.size * 0.8);
                ctx.lineTo(-enemy.size * 0.7, 0);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#FFFF00';
                ctx.beginPath();
                ctx.arc(0, 0, enemy.size * 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'red';
                ctx.beginPath();
                ctx.arc(0,0, enemy.size * 0.15, 0, Math.PI*2);
                ctx.fill();

                ctx.restore();
            });
        }

        function drawBullets() {
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.size / 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = bullet.type === 'player' ? 'rgba(255, 255, 0, 0.3)' :
                                 bullet.type === 'ally' ? 'rgba(152, 251, 152, 0.3)' : 'rgba(255, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawCollectibles() {
            collectibles.forEach(item => {
                const yOffset = Math.sin(item.bounce) * 5;
                ctx.save();
                ctx.translate(item.x, item.y + yOffset);
                
                if (item.type === 'star') {
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        ctx.lineTo(Math.cos((18 + i * 72) / 180 * Math.PI) * (item.size),
                                    -Math.sin((18 + i * 72) / 180 * Math.PI) * (item.size));
                        ctx.lineTo(Math.cos((54 + i * 72) / 180 * Math.PI) * (item.size * 0.5),
                                    -Math.sin((54 + i * 72) / 180 * Math.PI) * (item.size * 0.5));
                    }
                    ctx.closePath();
                    ctx.fill();
                } else if (item.type === 'heart') {
                    ctx.fillStyle = '#FF69B4';
                    ctx.beginPath();
                    ctx.moveTo(0, -item.size * 0.3);
                    ctx.bezierCurveTo(-item.size * 0.7, -item.size * 0.8, -item.size * 1.2, -item.size * 0.2, 0, item.size * 0.6);
                    ctx.bezierCurveTo(item.size * 1.2, -item.size * 0.2, item.size * 0.7, -item.size * 0.8, 0, -item.size * 0.3);
                    ctx.closePath();
                    ctx.fill();
                } else if (item.type === 'ally') {
                    // Draw a friendly drone similar to the player, but smaller
                    ctx.fillStyle = '#98FB98'; // Greenish
                    ctx.beginPath();
                    ctx.ellipse(0, 0, item.size * 0.8, item.size * 0.6, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // Propeller blur
                    ctx.fillStyle = 'rgba(100, 100, 100, 0.2)';
                    ctx.beginPath();
                    ctx.ellipse(0, -item.size * 0.7, item.size * 1.2, item.size * 0.3, Date.now()*0.01, 0, Math.PI * 2);
                    ctx.fill();

                    // Friendly eyes
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(-item.size * 0.2, 0, item.size * 0.1, 0, Math.PI * 2);
                    ctx.arc(item.size * 0.2, 0, item.size * 0.1, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'blue';
                    ctx.beginPath();
                    ctx.arc(-item.size * 0.2, 0, item.size * 0.05, 0, Math.PI * 2);
                    ctx.arc(item.size * 0.2, 0, item.size * 0.05, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            });
        }


        function drawAllyDrones() {
            allyDrones.forEach(ally => {
                ctx.save();
                ctx.translate(ally.x, ally.y);

                // Propeller blur
                ctx.fillStyle = 'rgba(100, 100, 100, 0.3)';
                ctx.beginPath();
                ctx.ellipse(0, -ally.size * 0.7, ally.size * 1.2, ally.size * 0.3, Date.now()*0.01, 0, Math.PI * 2);
                ctx.fill();

                // Ally Drone Body
                ctx.fillStyle = '#98FB98'; // Light green
                ctx.beginPath();
                ctx.ellipse(0, 0, ally.size * 0.8, ally.size * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();

                // Ally Drone "Cabin" or Highlight
                ctx.fillStyle = '#CCFFCC'; // Even lighter green
                ctx.beginPath();
                ctx.ellipse(0, -ally.size * 0.1, ally.size * 0.5, ally.size * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();

                // Eyes
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-ally.size * 0.25, -ally.size * 0.05, ally.size * 0.15, 0, Math.PI * 2);
                ctx.arc(ally.size * 0.25, -ally.size * 0.05, ally.size * 0.15, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'blue';
                ctx.beginPath();
                ctx.arc(-ally.size * 0.25, -ally.size * 0.05, ally.size * 0.07, 0, Math.PI * 2);
                ctx.arc(ally.size * 0.25, -ally.size * 0.05, ally.size * 0.07, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.fillStyle = `rgba(${parseInt(p.color.slice(1,3), 16)}, ${parseInt(p.color.slice(3,5), 16)}, ${parseInt(p.color.slice(5,7), 16)}, ${p.life / 30})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function gameLoop() {
            if (!gameState.running) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear canvas

            drawBackground();
            updatePlayer();
            updateEnemies();
            updateBullets();
            updateCollectibles();
            updateAllyDrones();
            updateParticles();

            spawnNewObjects();
            updateUI();

            drawCollectibles();
            drawEnemies();
            drawAllyDrones();
            drawBullets();
            drawPlayer();
            drawParticles();

            gameLoopRequestId = requestAnimationFrame(gameLoop);
        }

        // 初期状態ではコントロールを非表示にする
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('controls').style.display = 'none';
        });
    </script>
</body>
</html>
